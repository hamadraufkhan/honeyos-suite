name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Configure repo base path
        run: |
          if [ "${{ github.event.repository.name }}" = "${{ github.repository_owner }}.github.io" ]; then
            echo "BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "BASE_PATH=/${{ github.event.repository.name }}/" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build site
        run: bun run build

      - name: Prepare static artifact
        run: |
          rm -rf pages
          mkdir -p pages
          if [ -f "dist/index.html" ]; then
            cp -R dist/. pages/
          elif [ -d ".output/public" ]; then
            cp -R .output/public/. pages/
          elif [ -d "dist" ]; then
            cp -R dist/. pages/
          else
            echo "No static output directory found (.output/public or dist)." >&2
            exit 1
          fi
          shopt -s nullglob globstar
          for candidate in \
            "pages/index.html" \
            "pages/${{ github.event.repository.name }}/index.html" \
            "pages/index/index.html" \
            pages/**/index.html \
            "pages/200.html"; do
            if [ -f "$candidate" ]; then
              cp "$candidate" pages/index.html
              break
            fi
          done
          if [ ! -f "pages/index.html" ]; then
            entry_js=""
            css_file=""
            js_candidates=(pages/assets/index-*.js pages/assets/*.js)
            css_candidates=(pages/assets/styles-*.css pages/assets/*.css)
            for candidate in "${js_candidates[@]}"; do
              if [ -f "$candidate" ]; then
                entry_js="${candidate#pages/}"
                break
              fi
            done
            for candidate in "${css_candidates[@]}"; do
              if [ -f "$candidate" ]; then
                css_file="${candidate#pages/}"
                break
              fi
            done
            if [ -n "$entry_js" ]; then
              {
                echo '<!doctype html>'
                echo '<html lang="en">'
                echo '  <head>'
                echo '    <meta charset="UTF-8" />'
                echo '    <meta name="viewport" content="width=device-width, initial-scale=1.0" />'
                if [ -n "$css_file" ]; then
                  echo "    <link rel=\"stylesheet\" href=\"${BASE_PATH}${css_file}\" />"
                fi
                echo '    <title>HoneyOS</title>'
                echo '  </head>'
                echo '  <body>'
                echo "    <script type=\"module\" src=\"${BASE_PATH}${entry_js}\"></script>"
                echo '  </body>'
                echo '</html>'
              } > pages/index.html
            fi
          fi
          if [ ! -f "pages/index.html" ]; then
            echo "pages/index.html not found. Build output is not static-host compatible." >&2
            echo "Dumping generated files for debugging:"
            ls -la pages || true
            find pages -maxdepth 5 -type f | sort || true
            exit 1
          fi
          cp pages/index.html pages/404.html
          touch pages/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
